function fill(email,p){document.getElementById('lu').value=email;document.getElementById('lp').value=p;document.getElementById('login-error').style.display='none'}
async function doLogin(){
  const btn=document.getElementById('login-btn');
  if(btn){btn.disabled=true;btn.textContent='Signing in...';}
  try{
    const email=document.getElementById('lu').value.trim();
    const password=document.getElementById('lp').value;
    if(!email||!password){document.getElementById('login-error').style.display='block';if(btn){btn.disabled=false;btn.textContent='Sign In';}return}
    const{data:authData,error:authError}=await sb.auth.signInWithPassword({email,password});
    if(authError){
      document.getElementById('login-error').textContent=authError.message||'Invalid email or password.';
      document.getElementById('login-error').style.display='block';
      if(btn){btn.disabled=false;btn.textContent='Sign In';}
      return;
    }
    document.getElementById('login-error').style.display='none';
    // Fetch profile
    const{data:profile,error:profErr}=await sb.from('profiles').select('*').eq('id',authData.user.id).single();
    if(profErr||!profile){
      document.getElementById('login-error').textContent='Profile not found. Contact admin.';
      document.getElementById('login-error').style.display='block';
      if(btn){btn.disabled=false;btn.textContent='Sign In';}
      return;
    }
    const user=snakeToCamel(profile);
    user.email=email;
    S.user=user;S.view='tasks';S.tv='list';S.fp='all';S.fs='all';
    await fetchAllData();
    initPresence(user.id);
    try{requestNotifPermission();}catch(e){}
    try{checkNewNotifs();}catch(e){}
    document.getElementById('login-page').style.display='none';
    const app=document.getElementById('app');
    app.style.removeProperty('display');
    app.style.display='flex';
    renderSidebar();renderMain();
    setupRealtimeSubscriptions();
  }catch(err){
    console.error('Login error:',err);
    document.getElementById('login-error').textContent='Something went wrong: '+err.message;
    document.getElementById('login-error').style.display='block';
  }
  if(btn){btn.disabled=false;btn.textContent='Sign In';}
}

// ===== KANBAN DRAG & DROP =====
let _dragId=null,_dragMoved=false;
function kDragStart(e,el){
  _dragId=el.dataset.id;_dragMoved=false;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',_dragId);
  requestAnimationFrame(()=>el.classList.add('dragging'));
}
function kDragEnd(e,el){
  el.classList.remove('dragging');
  document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-over'));
  _dragId=null;
}
function kDragOver(e,col){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  col.classList.add('drag-over');
}
function kDragLeave(e,col){
  if(!col.contains(e.relatedTarget))col.classList.remove('drag-over');
}
function kDrop(e,col){
  e.preventDefault();col.classList.remove('drag-over');
  const id=_dragId||e.dataTransfer.getData('text/plain');
  if(!id)return;
  const newStatus=col.dataset.status;
  const tasks=getTasks();
  const task=tasks.find(t=>t.id===id);
  if(!task||task.status===newStatus)return;
  task.status=newStatus;
  _memTasks=tasks;
  if(_supabaseOk)sbUpdate('tasks',id,{status:newStatus});
  _dragMoved=true;
  toast(`Moved to ${newStatus==='todo'?'To Do':newStatus==='inprogress'?'In Progress':'Done'}`);
  renderSidebar();renderMain();
}
function kClick(e,id){if(!_dragMoved)openEditTask(id)}

function fmtRefField(el,prefix){
  // Auto-prepend prefix and allow only digits after it
  let v=el.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();
  if(!v.startsWith(prefix))v=prefix+(v.startsWith(prefix[0])?v.slice(1):v);
  const digits=v.slice(prefix.length).replace(/\D/g,'').slice(0,5);
  el.value=digits?prefix+digits:prefix;
}

async function saveEditTask(id){
  const description=document.getElementById('md').value.trim();
  if(!description){toast('Please enter a description','error');return}
  const isAdmin=S.user.role==='admin';
  const tasks=getTasks();const idx=tasks.findIndex(t=>t.id===id);if(idx===-1)return;
  let assignees=tasks[idx].assignees;
  if(isAdmin){const ag=document.getElementById('ag');if(ag){const sel=[...ag.querySelectorAll('.assignee-chip.selected')].map(e=>e.dataset.uid);if(sel.length)assignees=sel}}
  const bhEl=document.getElementById('mt-bh');
  const billableH=bhEl?(bhEl.value?parseFloat(bhEl.value):null):tasks[idx].billableH;
  const wasNotQuoted=!tasks[idx].billableH;
  const isNowQuoted=!!billableH;
  if(wasNotQuoted&&isNowQuoted){
    const tl=getTimeLogs();
    const updated=tl.map(l=>l.taskId===id?{...l,billableH:0}:l);
    _memTimeLogs=updated;
    if(_supabaseOk){
      const logsToUpdate=updated.filter(l=>l.taskId===id);
      for(const l of logsToUpdate){sbUpdate('time_logs',l.id,{billableH:0});}
    }
    toast('Billable hours set. Previous time logs have been reset to 0 billable — please update them.','warn');
  }
  const prevAssignees=tasks[idx].assignees||[];
  const priority=document.getElementById('mp').value;
  const status=document.getElementById('ms').value;
  const dueDate=document.getElementById('mdd').value||null;
  tasks[idx]={...tasks[idx],title:description,description,priority,status,dueDate,assignees,billableH};
  _memTasks=tasks;
  if(_supabaseOk)sbUpdate('tasks',id,{title:description,description,priority,status,dueDate,assignees,billableH});
  const newlyAssigned=assignees.filter(aid=>!prevAssignees.includes(aid));
  if(newlyAssigned.length)pushTaskNotifs(newlyAssigned,description,id,tasks[idx].jobBagId||null);
  closeModal();renderSidebar();renderMain();if(!wasNotQuoted||!isNowQuoted)toast('Task updated');
}

}
function delTaskConfirm(id){

function toggleTaskMenu(id,e){
  e.stopPropagation();
  const el=document.getElementById(id);
  const isOpen=el.style.display!=='none';
  // Close all open menus first
  document.querySelectorAll('.task-action-menu').forEach(m=>m.style.display='none');

}
function closeTaskMenu(id){const el=document.getElementById(id);if(el)el.style.display='none';}
document.addEventListener('click',()=>document.querySelectorAll('.task-action-menu').forEach(m=>m.style.display='none'));

function openMoveTask(taskId){
  const task=getTasks().find(t=>t.id===taskId);if(!task)return;
  const clients=getClients();
  const jbs=getJobBags().filter(j=>j.status!=='archived');
  openModal(`
    <div class="modal-header"><div class="modal-title">Move Task</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="padding:20px 24px">
      <p style="color:var(--text-secondary);font-size:13px;margin:0 0 16px">Move <strong>"${esc(task.title)}"</strong> to a different job bag.</p>
      <div class="form-group">
        <label class="form-label">CLIENT</label>
        <select class="form-select" id="mv-cl" onchange="updateMoveJobBags()">
          <option value="">Select client…</option>
          ${clients.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">JOB BAG</label>
        <select class="form-select" id="mv-jb">
          <option value="">Select client first…</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMoveTask('${taskId}')">Move Task</button>
    </div>`);
}
function updateMoveJobBags(){
  const cId=document.getElementById('mv-cl').value;
  const jbs=getJobBags().filter(j=>j.status!=='archived'&&(!cId||j.clientId===cId));
  const sel=document.getElementById('mv-jb');
  sel.innerHTML=jbs.length
    ?`<option value="">Select job bag…</option>`+jbs.map(j=>`<option value="${j.id}">${esc(j.name)}</option>`).join('')
    :`<option value="">No active job bags for this client</option>`;
}
async function saveMoveTask(taskId){
  const newJbId=document.getElementById('mv-jb').value;
  if(!newJbId){toast('Select a job bag','error');return}
  const jb=getJobBags().find(j=>j.id===newJbId);
  const tasks=getTasks();
  const idx=tasks.findIndex(t=>t.id===taskId);
  if(idx<0)return;
  tasks[idx].jobBagId=newJbId;
  const tl=getTimeLogs().map(l=>l.taskId===taskId?{...l,jobBagId:newJbId}:l);
  _memTimeLogs=tl;_memTasks=tasks;
  if(_supabaseOk){
    sbUpdate('tasks',taskId,{jobBagId:newJbId});
    tl.filter(l=>l.taskId===taskId).forEach(l=>sbUpdate('time_logs',l.id,{jobBagId:newJbId}));
  }
  closeModal();renderMain();
  toast(`Moved to "${jb.name}"`);
}

async function delUser(id){
  if(!confirm('Delete this user? Their tasks will also be removed.'))return;
  const users=getUsers().filter(u=>u.id!==id);
  const tasks=getTasks().map(t=>({...t,assignees:t.assignees.filter(x=>x!==id)})).filter(t=>t.assignees.length>0);
  _memUsers=users;_memTasks=tasks;
  if(_supabaseOk){
    sbDelete('profiles',id);
    // Update tasks that had this user assigned
    for(const t of tasks){sbUpdate('tasks',t.id,{assignees:t.assignees});}
  }
  closeModal();renderSidebar();renderMain();refreshLoginChips();toast('User deleted');
}

function renderTimesheetTab(jbId,tasks,tl){
  const users=getUsers();
  const totalLogged=tl.reduce((s,l)=>s+l.hours,0);

  const totalBillable=tasks.reduce((s,t)=>s+(t.billableH||0),0);
  const totalVariance=totalBillable-totalLogged;
  const doneTasks=tasks.filter(t=>t.status==='done').length;
  const isMember=getJobBags().find(j=>j.id===jbId)?.members.includes(S.user.id)||S.user.role==='admin';
  const pct=totalBillable>0?Math.min(100,Math.round(totalBillableLogged/totalBillable*100)):null;
  const pctColor=pct===null?'var(--blue)':pct>=100?'var(--high)':pct>=75?'var(--accent)':'var(--low)';
  return`
  <div class="ts-summary">
    <div class="ts-summary-item"><div class="ts-summary-val">${tasks.length}</div><div class="ts-summary-lbl">Total Tasks</div></div>

            </div>

          <td><span class="ts-hours">${taskLogged>0?fmtHM(taskLogged):'—'}</span></td>

async function saveBrief(jbId){
  const el=document.getElementById('rte-'+jbId);if(!el)return;
  const jbs=getJobBags();const idx=jbs.findIndex(j=>j.id===jbId);if(idx===-1)return;
  const html=el.innerHTML;
  const s=document.getElementById('brief-status-'+jbId);
  if(s)s.textContent='Saving…';
  jbs[idx].description=html;
  _memJobBags=jbs;
  if(_supabaseOk){
    const{error}=await sb.from('job_bags').update({description:html}).eq('id',jbId);
    if(error){
      console.error('saveBrief:',error);
      if(s)s.textContent='Save failed';
      toast('Save failed: '+error.message,'error');
      return;

  }

  toast('Brief saved');

async function handleBriefFiles(e,jbId){
  const files=[...e.target.files];
  if(!files.length)return;
  const jbs=getJobBags();const idx=jbs.findIndex(j=>j.id===jbId);if(idx===-1)return;
  if(!jbs[idx].files)jbs[idx].files=[];
  toast('Uploading '+files.length+' file'+(files.length>1?'s':'')+'...');
  for(const f of files){
    try{
      const uploaded=await uploadToFTP(f,'jobbag');
      jbs[idx].files.push(uploaded);
      if(_supabaseOk){
        await sb.from('job_bag_files').insert({job_bag_id:jbId,name:uploaded.name,type:uploaded.type,size:uploaded.size,url:uploaded.url,storage_path:uploaded.storagePath||null,uploaded_by:S.user.id});
      }
    }catch(err){toast('Upload failed: '+f.name,'error');console.error(err);}
  }
  _memJobBags=jbs;
  const fg=document.getElementById('fg-'+jbId);
  if(fg)fg.innerHTML=renderFileGrid(jbs[idx].files,jbId,true);
  toast(files.length+' file'+(files.length>1?'s':'')+' uploaded');
  e.target.value='';
}

async function removeBriefFile(jbId,idx){
  const jbs=getJobBags();const jbIdx=jbs.findIndex(j=>j.id===jbId);if(jbIdx===-1)return;
  const removed=jbs[jbIdx].files.splice(idx,1)[0];
  _memJobBags=jbs;
  if(_supabaseOk&&removed&&removed.storagePath){
    sb.storage.from('uploads').remove([removed.storagePath]);
  }
  const fg=document.getElementById('fg-'+jbId);if(fg)fg.innerHTML=renderFileGrid(jbs[jbIdx].files,jbId,true);
}

function viewFile(jbId,idx){
  const jbs=getJobBags();const jb=jbs.find(j=>j.id===jbId);if(!jb)return;
  const f=jb.files[idx];if(!f)return;
  const src=f.url||f.data;
  if(f.type&&f.type.startsWith('image/')){
    openModal(`<div class="modal-header"><div class="modal-title">${esc(f.name)}</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" style="text-align:center"><img src="${src}" style="max-width:100%;border-radius:8px"></div><div class="modal-footer"><a href="${src}" download="${esc(f.name)}" class="btn btn-secondary" target="_blank">Download</a><button class="btn btn-primary" style="width:auto" onclick="closeModal()">Close</button></div>`);
  } else {
    window.open(src,'_blank');
  }
}

// ===== CHAT =====
let _chatFiles={};
let _uploadQueue=0;
async function uploadToFTP(file,folder){
  if(!_supabaseOk)throw new Error('Not connected to Supabase');
  _uploadQueue++;
  try{
    const ext=file.name.split('.').pop();
    const path=`${folder||'chat'}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const{data,error}=await sb.storage.from('uploads').upload(path,file);
    if(error)throw error;
    const{data:{publicUrl}}=sb.storage.from('uploads').getPublicUrl(path);
    _uploadQueue--;
    return{name:file.name,type:file.type,size:file.size,data:publicUrl,url:publicUrl,storagePath:path};
  }catch(err){_uploadQueue--;throw err;}
}
function fmtFileSize(bytes){if(!bytes)return'';if(bytes<1024)return bytes+'B';if(bytes<1048576)return(bytes/1024).toFixed(1)+'KB';return(bytes/1048576).toFixed(1)+'MB'}

  if(!type)return'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
  if(type.startsWith('image/'))return'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';

  return'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
}
const DL_ICO='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
function chatFileHTML(f){
  const src=f.url||f.data;
  if(f.type&&f.type.startsWith('image/')){
    return`<div class="chat-img-wrap"><img class="chat-img-preview" src="${src}" alt="${esc(f.name)}" onclick="window.open(this.src,'_blank')"><a class="chat-img-dl" href="${src}" download="${esc(f.name)}" title="Download ${esc(f.name)}" target="_blank">${DL_ICO}</a></div>`;
  }

async function handleChatFiles(e,jbId){
  const files=[...e.target.files];
  if(!files.length)return;
  const oversized=files.filter(f=>f.size>5*1024*1024);
  if(oversized.length){toast('File too large (max 5MB): '+oversized.map(f=>f.name).join(', '),'error');e.target.value='';return;}
  if(!_chatFiles[jbId])_chatFiles[jbId]=[];
  toast('Uploading '+files.length+' file'+(files.length>1?'s':'')+'...');
  for(const f of files){
    try{
      const uploaded=await uploadToFTP(f,'chat');
      _chatFiles[jbId].push(uploaded);
      renderChatFilePrev(jbId);
    }catch(err){toast('Upload failed: '+f.name,'error');console.error(err);}
  }
  e.target.value='';
}
function renderChatFilePrev(jbId){
  const prev=document.getElementById('chat-file-prev-'+jbId);if(!prev)return;
  const files=_chatFiles[jbId]||[];
  if(files.length===0){prev.style.display='none';prev.innerHTML='';return}
  prev.style.display='flex';
  prev.innerHTML=files.map((f,i)=>`<div class="chat-file-chip">${esc(f.name)}<button onclick="removeChatFile('${jbId}',${i})" style="background:none;border:none;cursor:pointer;color:var(--high);font-size:12px;padding:0 2px">✕</button></div>`).join('');
}
function removeChatFile(jbId,idx){
  if(_chatFiles[jbId])_chatFiles[jbId].splice(idx,1);
  renderChatFilePrev(jbId);
}
function chatKeyDown(e,jbId){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChatMsg(jbId)}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}

function toggleEmojiPicker(jbId){
  const el=document.getElementById('emoji-pick-'+jbId);
  if(!el)return;
  const isOpen=el.classList.contains('open');
  // Close all open pickers first
  document.querySelectorAll('.emoji-picker.open').forEach(p=>p.classList.remove('open'));
  if(!isOpen){
    el.innerHTML=EMOJI_DATA.map(([cat,emojis])=>`<div class="emoji-picker-cat">${cat}</div><div class="emoji-picker-grid">${emojis.map(e=>`<button class="emoji-btn" onclick="insertEmoji('${jbId}','${e}')">${e}</button>`).join('')}</div>`).join('');
    el.classList.add('open');
  }
}
function insertEmoji(jbId,emoji){
  const inp=document.getElementById('chat-inp-'+jbId);if(!inp)return;
  const start=inp.selectionStart,end=inp.selectionEnd;
  inp.value=inp.value.slice(0,start)+emoji+inp.value.slice(end);
  inp.selectionStart=inp.selectionEnd=start+emoji.length;
  inp.focus();autoResize(inp);
  document.querySelectorAll('.emoji-picker.open').forEach(p=>p.classList.remove('open'));
}
// Close emoji picker on outside click
document.addEventListener('click',e=>{if(!e.target.closest('.emoji-picker-wrap'))document.querySelectorAll('.emoji-picker.open').forEach(p=>p.classList.remove('open'))});
async function deleteChatMsg(jbId,msgId){
  _memChatMsgs[jbId]=(getChatMsgs(jbId)||[]).filter(m=>m.id!==msgId);
  if(_supabaseOk)sbDelete('chat_messages',msgId);
  const el=document.getElementById('cmsg-'+msgId);
  if(el)el.remove();
}
async function sendChatMsg(jbId){
  const inp=document.getElementById('chat-inp-'+jbId);if(!inp)return;
  const text=inp.value.trim();
  const files=_chatFiles[jbId]||[];
  if(!text&&files.length===0)return;
  clearTyping(jbId);
  const newMsg={id:uid('cm'),userId:S.user.id,text,files,ts:new Date().toISOString()};
  if(_supabaseOk){
    const{data,error}=await sb.from('chat_messages').insert({channel:jbId,user_id:S.user.id,text,files:files.length?files:null}).select().single();
    if(data){newMsg.id=data.id;newMsg.ts=data.created_at;}
    if(error)console.error('sendChat:',error);
  }
  if(!_memChatMsgs[jbId])_memChatMsgs[jbId]=[];
  _memChatMsgs[jbId].push(newMsg);
  inp.value='';inp.style.height='auto';
  _chatFiles[jbId]=[];
  renderChatFilePrev(jbId);
  if(jbId===TEAM_CHAT_KEY){renderMain();}else{S.jbTab='chat';renderMain();}
}

// ===== LOG TIME =====
function openLogTime(taskId,jbId){
  const task=getTasks().find(t=>t.id===taskId);if(!task)return;
  const todayStr=TODAY.toISOString().split('T')[0];
  const isQuoted=!!task.billableH;
  // Calculate remaining billable quota for this task
  const allLogs=getTimeLogs();
  const usedBillable=allLogs.filter(l=>l.taskId===taskId).reduce((s,l)=>s+(l.billableH||0),0);
  const remaining=isQuoted?Math.max(0,Math.round((task.billableH-usedBillable)*4)/4):0;
  const remainLabel=isQuoted?`<span style="color:${remaining<=0?'var(--high)':remaining<task.billableH?'var(--accent)':'var(--low)'};font-size:10px;font-weight:400"> — ${remaining<=0?'fully allocated':fmtHM(remaining)+' remaining'}</span>`:'';
  const fullyAllocated=isQuoted&&remaining<=0;
  openModal(`
    <div class="modal-header"><div class="modal-title">Log Time</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">${esc(task.title)}</div>
      ${fullyAllocated?`<div style="background:var(--high-dim,rgba(239,68,68,.1));border:1px solid var(--high);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--high);margin-bottom:14px">All billable hours for this task have been allocated. You can still log time but no billable hours remain.</div>`:''}
      <div class="form-group"><label class="form-label">Date</label>${dpHTML('lt-d',todayStr)}</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Logged Hours *</label><select class="form-select" id="lt-h" style="font-family:'JetBrains Mono',monospace">${timeOptions(0)}</select></div>
        ${isQuoted
          ?`<div class="form-group"><label class="form-label">Billable Hours${remainLabel}</label><select class="form-select" id="lt-bh" style="font-family:'JetBrains Mono',monospace"${fullyAllocated?' disabled':''}>${cappedTimeOptions(0,remaining)}</select></div>`
          :`<div class="form-group"><label class="form-label">Billable Hours</label><div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--text-muted);font-style:italic">Not Quoted — mirrors logged hours</div><input type="hidden" id="lt-bh" value=""></div>`
        }
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="lt-n" placeholder="What did you work on?" style="resize:vertical;field-sizing:content;min-height:80px"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="width:auto" onclick="saveTimeLog('${taskId}','${jbId}','${isQuoted}')">Log Time</button>
    </div>`);
  dpInit('lt-d',todayStr);
}
async function saveTimeLog(taskId,jbId,isQuoted){
  const h=parseFloat(document.getElementById('lt-h').value);
  if(!h||h<=0){toast('Select logged hours','error');return}
  const bhRaw=parseFloat(document.getElementById('lt-bh').value)||0;
  const bh=(isQuoted==='true'||isQuoted===true)?bhRaw:h;
  const logs=getTimeLogs();
  const newLog={id:uid('tl'),taskId,jobBagId:jbId,userId:S.user.id,hours:h,billableH:bh,date:document.getElementById('lt-d').value||TODAY.toISOString().split('T')[0],notes:document.getElementById('lt-n').value.trim()};
  if(_supabaseOk){
    const inserted=await sbInsert('time_logs',newLog);
    if(inserted)newLog.id=inserted.id;
  }
  logs.push(newLog);
  _memTimeLogs=logs;
  closeModal();toast('Time logged: '+fmtHM(h)+(bh!==h?' · '+fmtHM(bh)+' billable':''));
  renderMain();
}
async function delTimeLog(id){
  closeModal();
  _memTimeLogs=getTimeLogs().filter(l=>l.id!==id);
  if(_supabaseOk)sbDelete('time_logs',id);
  renderMain();toast('Time entry removed');
}

// ===== EDIT TIME LOG =====
function openEditTimeLog(logId){
  const logs=getTimeLogs();
  const log=logs.find(l=>l.id===logId);if(!log)return;
  const isAdmin=S.user.role==='admin';
  if(!isAdmin&&log.userId!==S.user.id){toast('You can only edit your own time entries','error');return}
  const task=getTasks().find(t=>t.id===log.taskId);
  const members=getUsers().filter(u=>u.role==='member'||u.role==='admin');
  openModal(`
    <div class="modal-header"><div class="modal-title">Edit Time Entry</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      ${task?`<div style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">${esc(task.title)}</div>`:''}
      ${isAdmin?`<div class="form-group"><label class="form-label">Logged By</label>
        <select class="form-select" id="lt-u">
          ${members.map(u=>`<option value="${u.id}"${u.id===log.userId?' selected':''}>${esc(u.name)}</option>`).join('')}
        </select>
      </div>`:''}
      <div class="form-group"><label class="form-label">Date</label>${dpHTML('lt-d',log.date)}</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Logged Hours *</label><select class="form-select" id="lt-h" style="font-family:'JetBrains Mono',monospace">${timeOptions(log.hours)}</select></div>
        ${(()=>{
          if(!task||!task.billableH){
            return`<div class="form-group"><label class="form-label">Billable Hours</label><div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--text-muted);font-style:italic">Not Quoted — mirrors logged hours</div><input type="hidden" id="lt-bh" value=""></div>`;
          }
          // Remaining = quota minus all OTHER logs (excluding this one)
          const usedByOthers=logs.filter(l=>l.taskId===log.taskId&&l.id!==logId).reduce((s,l)=>s+(l.billableH||0),0);
          const maxForThis=Math.max(0,Math.round((task.billableH-usedByOthers)*4)/4);
          const remainLabel=`<span style="color:var(--text-muted);font-size:10px"> — up to ${fmtHM(maxForThis)} available</span>`;
          return`<div class="form-group"><label class="form-label">Billable Hours${remainLabel}</label><select class="form-select" id="lt-bh" style="font-family:'JetBrains Mono',monospace">${cappedTimeOptions(log.billableH||0,maxForThis)}</select></div>`;
        })()}
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="lt-n" style="resize:vertical;field-sizing:content;min-height:80px">${esc(log.notes||'')}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="delTimeLog('${logId}')">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="width:auto" onclick="saveEditTimeLog('${logId}')">Save Changes</button>
    </div>`);
  dpInit('lt-d',log.date);
}
async function saveEditTimeLog(logId){
  const h=parseFloat(document.getElementById('lt-h').value);
  if(!h||h<=0){toast('Select logged hours','error');return}
  const isAdmin=S.user.role==='admin';
  const logs=getTimeLogs();const idx=logs.findIndex(l=>l.id===logId);if(idx===-1)return;
  const task=getTasks().find(t=>t.id===logs[idx].taskId);
  const isQuoted=task&&task.billableH;
  const bhRaw=parseFloat(document.getElementById('lt-bh').value)||0;
  const bh=isQuoted?bhRaw:h;
  const userId=isAdmin&&document.getElementById('lt-u')?document.getElementById('lt-u').value:logs[idx].userId;
  const date=document.getElementById('lt-d').value||logs[idx].date;
  const notes=document.getElementById('lt-n').value.trim();
  logs[idx]={...logs[idx],hours:h,billableH:bh,date,notes,userId};
  _memTimeLogs=logs;
  if(_supabaseOk)sbUpdate('time_logs',logId,{hours:h,billableH:bh,date,notes,userId});
  closeModal();toast('Time entry updated');renderMain();
}

// ===== SHARE LINKS & DUPLICATE =====
function genToken(){return Math.random().toString(36).slice(2,9)+Math.random().toString(36).slice(2,9)}
function getPageUrl(){const u=location.href.split('?')[0].split('#')[0];return u}
async function copyJbShareLink(jbId){
  const jbs=getJobBags();const idx=jbs.findIndex(j=>j.id===jbId);if(idx===-1)return;
  if(!jbs[idx].shareToken){jbs[idx].shareToken=genToken();_memJobBags=jbs;if(_supabaseOk)sbUpdate('job_bags',jbId,{shareToken:jbs[idx].shareToken});}
  if(jbs[idx].clientId){
    const clients=getClients();const cidx=clients.findIndex(c=>c.id===jbs[idx].clientId);
    if(cidx!==-1&&!clients[cidx].shareToken){clients[cidx].shareToken=genToken();_memClients=clients;if(_supabaseOk)sbUpdate('clients',clients[cidx].id,{shareToken:clients[cidx].shareToken});}
  }
  const url=getPageUrl()+'?jb='+jbs[idx].shareToken;
  navigator.clipboard.writeText(url).then(()=>toast('Share link copied!')).catch(()=>{prompt('Copy this link:',url)});
}
async function copyClientShareLink(clientId){

async function duplicateJobBag(jbId){
  const jbs=getJobBags();
  const src=jbs.find(j=>j.id===jbId);if(!src)return;
  const baseName=src.name.replace(/ Copy( \d+)?$/,'');
  let newName=baseName+' Copy';
  if(jbs.find(j=>j.name===newName)){
    let n=2;while(jbs.find(j=>j.name===baseName+' Copy '+n))n++;
    newName=baseName+' Copy '+n;
  }
  const {files:_,...srcClean}=src;
  const newJb={...srcClean,id:uid('jb'),name:newName,shareToken:null,createdAt:new Date().toISOString()};
  if(_supabaseOk){
    const inserted=await sbInsert('job_bags',newJb);
    if(inserted)newJb.id=inserted.id;
  }
  newJb.files=[];
  jbs.push(newJb);
  _memJobBags=jbs;
  const tasks=getTasks();
  const srcTasks=tasks.filter(t=>t.jobBagId===jbId);
  for(const t of srcTasks){
    const nt={...t,id:uid('t'),jobBagId:newJb.id,createdAt:new Date().toISOString()};
    if(_supabaseOk){const ins=await sbInsert('tasks',nt);if(ins)nt.id=ins.id;}
    tasks.push(nt);
  }
  _memTasks=tasks;
  renderMain();toast('Duplicated as "'+newName+'"');
}

function mlBuildChart(days,maxH,dailyTarget){
  // SVG dimensions
  const VW=620,BAR_H=90,LABEL_H=18,VH=BAR_H+LABEL_H;
  const n=days.length;
  const slotW=VW/n;
  const gap=Math.max(slotW*0.18,1.5);
  const bw=slotW-gap;

  // Subtle grid lines at 25 / 50 / 75 %
  const gridColor='rgba(255,255,255,0.04)';
  let svg=`<svg class="ml-chart-svg" viewBox="0 0 ${VW} ${VH}" preserveAspectRatio="none" style="height:${VH}px">`;

  // Grid lines
  [0.25,0.5,0.75].forEach(p=>{
    const gy=BAR_H-(p*BAR_H);
    svg+=`<line x1="0" y1="${gy}" x2="${VW}" y2="${gy}" stroke="${gridColor}" stroke-width="1"/>`;
  });
  // Baseline
  svg+=`<line x1="0" y1="${BAR_H}" x2="${VW}" y2="${BAR_H}" stroke="rgba(26,43,60,1)" stroke-width="1"/>`;
  // Daily target line
  if(dailyTarget&&dailyTarget>0&&maxH>0){
    const ty=BAR_H-Math.min((dailyTarget/maxH)*(BAR_H-4),BAR_H-2);
    svg+=`<line x1="0" y1="${ty}" x2="${VW}" y2="${ty}" stroke="rgba(245,163,0,0.55)" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    svg+=`<text x="${VW-2}" y="${ty-3}" text-anchor="end" font-size="7.5" font-family="JetBrains Mono,monospace" fill="rgba(245,163,0,0.75)">${fmtHM(dailyTarget)}</text>`;
  }

  days.forEach((day,i)=>{
    const isActive=!!S.mlExpanded[day.ds];
    const barPx=day.logged>0?Math.max((day.logged/maxH)*(BAR_H-4),3):0;
    const x=i*slotW+gap/2;
    const by=BAR_H-barPx;
    const fill=day.isWeekend?'#F5A300':'#3AABD4';
    const fillOp=day.logged===0?0.12:isActive?1:0.72;
    const lblFill=day.isWeekend?'#F5A300':'#45607a';
    const lblWeight=day.isWeekend?'600':'400';

    svg+=`<g class="bar" onclick="toggleDayExpand('${day.ds}')">`;
    svg+=`<title>${day.isWeekend?'Weekend · ':''}${day.ds}${day.logged>0?' · '+fmtHM(day.logged)+' logged':' · No time logged'}</title>`;
    // Invisible full-height hit area
    svg+=`<rect x="${x}" y="0" width="${bw}" height="${BAR_H}" fill="transparent"/>`;
    // Actual bar
    if(barPx>0){
      svg+=`<rect class="bar-fill" x="${x}" y="${by}" width="${bw}" height="${barPx}" rx="2" fill="${fill}" fill-opacity="${fillOp}"/>`;
    }
    // Active indicator dot below baseline
    if(isActive){
      svg+=`<circle cx="${x+bw/2}" cy="${BAR_H+8}" r="2.5" fill="${fill}"/>`;
    }
    // Day number label
    svg+=`<text x="${x+bw/2}" y="${VH-2}" text-anchor="middle" font-size="8" font-family="JetBrains Mono,monospace" font-weight="${lblWeight}" fill="${lblFill}">${day.d}</text>`;
    svg+=`</g>`;
  });

  svg+=`</svg>`;
  return svg;
}

function getDayStats(allLogs,dateStr,uid){
  // Normalise to trimmed strings so mismatched types/whitespace can't slip through the filter
  const uidStr=uid==null?null:String(uid).trim();
  const dayLogs=allLogs.filter(l=>{
    if(l.date!==dateStr)return false;
    if(!uidStr)return true;// all-members view (admin only)
    const lUid=l.userId==null?'':String(l.userId).trim();
    return lUid===uidStr;
  });
  const logged=dayLogs.reduce((s,l)=>s+l.hours,0);
  const billable=dayLogs.reduce((s,l)=>s+(l.billableH||0),0);
  return{logged,billable,variance:billable-logged,entries:dayLogs};
}

function toggleDayExpand(dateStr){
  if(!S.mlExpanded)S.mlExpanded={};
  if(S.mlExpanded[dateStr])delete S.mlExpanded[dateStr];else S.mlExpanded[dateStr]=true;
  renderMain();
}

function renderMonthlyLogs(){
  const isAdmin=S.user.role==='admin';
  // Initialise state on first visit
  if(S.mlYear===null)S.mlYear=TODAY.getFullYear();
  if(S.mlMonth===null)S.mlMonth=TODAY.getMonth();
  if(!S.mlExpanded)S.mlExpanded={};
  if(S.mlUid===null)S.mlUid=isAdmin?'all':S.user.id;
  // Non-admins can ONLY see their own data, regardless of any carried-over selection
  if(!isAdmin)S.mlUid=S.user.id;

  const year=S.mlYear,month=S.mlMonth;
  const allLogs=getTimeLogs();
  const allUsers=getUsers();
  const members=allUsers.filter(u=>u.role==='member');

  // uid to filter logs — null means all users (admin only)
  const uid=isAdmin?(S.mlUid==='all'?null:S.mlUid):S.user.id;
  const viewUser=uid?allUsers.find(u=>u.id===uid):null;

  // Build day stats for every day of the month
  const daysInMonth=new Date(year,month+1,0).getDate();
  const days=[];
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(ds+'T12:00:00').getDay();
    const stats=getDayStats(allLogs,ds,uid);
    days.push({d,ds,dow,isWeekend:dow===0||dow===6,...stats});
  }

  const totalLogged=days.reduce((s,d)=>s+d.logged,0);
  const totalBillable=days.reduce((s,d)=>s+d.billable,0);
  const totalVariance=totalBillable-totalLogged;
  const activeDays=days.filter(d=>d.logged>0).length;
  const dailyAvg=activeDays>0?totalLogged/activeDays:0;
  const maxH=Math.max(...days.map(d=>d.logged),0.001);
  // Target progress — based on billable hours logged (not raw logged)
  const targetH=viewUser?(viewUser.targetH||0):members.reduce((s,u)=>s+(u.targetH||0),0);
  const targetPct=targetH>0?Math.min(Math.round((totalBillable/targetH)*100),999):null;

  return`
  <div class="page-header">
    <div>
      <div class="page-title">Monthly Logs</div>

    </div>
    <div class="header-actions" style="flex-wrap:wrap;gap:6px">
      <select class="filter-select" onchange="mlSetMonth(this.value)">
        ${ML_MONTHS.map((n,i)=>`<option value="${i}"${i===month?' selected':''}>${n}</option>`).join('')}
      </select>
      <select class="filter-select" style="width:82px;font-family:'JetBrains Mono',monospace" onchange="mlSetYear(this.value)">
        ${[2024,2025,2026,2027].map(y=>`<option value="${y}"${y===year?' selected':''}>${y}</option>`).join('')}
      </select>
    </div>
  </div>

  ${isAdmin?`<div class="ml-member-tabs" style="padding:12px 28px 0">
    <div class="ml-member-tab ${S.mlUid==='all'?'active':''}" onclick="mlSetUid('all')">All Members</div>
    ${members.map(u=>`<div class="ml-member-tab ${S.mlUid===u.id?'active':''}" onclick="mlSetUid('${u.id}')" style="${S.mlUid===u.id?'border-color:'+u.color+';color:'+u.color+';background:'+u.color+'18':''}">
      ${esc(u.name)}
    </div>`).join('')}
  </div>`:''}

  <!-- Target progress -->
  ${isAdmin&&S.mlUid==='all'?`
  <div class="target-grid">
    ${members.map(u=>{
      const uBillable=days.reduce((s,d)=>s+d.entries.filter(l=>l.userId===u.id).reduce((ss,l)=>ss+(l.billableH||0),0),0);
      const uLogged=days.reduce((s,d)=>s+d.entries.filter(l=>l.userId===u.id).reduce((ss,l)=>ss+l.hours,0),0);
      const uTarget=u.targetH||0;
      const uPct=uTarget>0?Math.min(Math.round((uBillable/uTarget)*100),999):null;
      const uColor=uPct===null?'var(--text-muted)':uPct>=100?'var(--low)':uPct>=70?'var(--blue)':'var(--accent)';
      return`<div class="target-card" onclick="mlSetUid('${u.id}');renderMain()" style="cursor:pointer">
        <div class="target-card-header">
          <div class="user-avatar" style="background:${u.color}22;color:${u.color};border:1.5px solid ${u.color}44;width:30px;height:30px;font-size:11px;flex-shrink:0">${initials(u.name)}</div>
          <div class="target-card-info">
            <div class="target-card-name">${esc(u.name)}</div>
            <div class="target-card-sub">${fmtHM(uBillable)} billable · ${fmtHM(uLogged)} logged${uTarget>0?' / '+uTarget+'h':''}</div>
          </div>
          <div class="target-pct" style="color:${uColor}">${uPct!==null?uPct+'%':'—'}</div>
        </div>
        <div class="target-bar-row">
          <div class="prog-wrap"><div class="prog-fill${uPct!==null&&uPct>=100?' prog-over':''}" style="width:${uPct!==null?Math.min(uPct,100):0}%;background:${uPct===null?'var(--text-muted)':uPct<100?u.color:'var(--low)'}"></div></div>
        </div>
      </div>`;
    }).join('')}
  </div>`
  :targetH>0?`
  <div class="target-solo">
    <div class="target-solo-row">
      <div class="target-solo-top">
        <div class="target-solo-label">Monthly Target Progress${viewUser?` — ${esc(viewUser.name)}`:''}</div>
        <div class="target-solo-nums" style="color:${targetPct>=100?'var(--low)':targetPct>=70?'var(--blue)':'var(--accent)'}">${fmtHM(totalBillable)} billable <span style="color:var(--text-muted)">of</span> ${targetH}h target <span style="font-weight:700;margin-left:4px;color:${targetPct>=100?'var(--low)':targetPct>=70?'var(--blue)':'var(--accent)'}">${targetPct}%</span></div>
      </div>
      <div class="prog-wrap" style="height:10px">
        <div class="prog-fill${targetPct>=100?' prog-over':''}" style="width:${Math.min(targetPct,100)}%;background:${targetPct>=100?'var(--low)':targetPct>=70?'var(--blue)':'var(--accent)'}"></div>
      </div>
    </div>

  <!-- Bar chart -->
  <div class="ml-chart-wrap">
    ${mlBuildChart(days,maxH,dailyTarget)}
    <div class="ml-daily-avg" style="${activeDays===0?'opacity:.4':''}">Daily Average — <strong>${fmtHM(dailyAvg)||'0:00'}</strong>${targetH>0?` <span style="color:var(--text-muted)">·</span> Daily target <strong>${fmtHM(dailyTarget)}</strong>`:''}</div>
  </div>

  <!-- Table -->
  <div class="ml-table-wrap" style="padding:16px 28px 0">
    <table class="ts-table ml-table">
      <thead>
        <tr>
          <th style="width:45%">Date</th>
          <th>Logged</th>
          <th>Billable</th>
          <th>Variance</th>
        </tr>
      </thead>
      <tbody>
        ${days.map(day=>{
          const isActive=!!S.mlExpanded[day.ds];
          const varPos=day.variance>0,varZero=day.variance===0;
          const dateLabel=`${ML_DOW[day.dow]}, ${day.d} ${ML_MONTHS_S[month]} ${year}`;
          return`<tr class="ml-day-row${day.isWeekend?' ml-weekend':''}${day.logged===0?' ml-zero':''}" onclick="toggleDayExpand('${day.ds}')">
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <svg class="ml-chevron" style="transform:rotate(${isActive?'90deg':'0deg'})" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                <span class="ml-date-label${day.isWeekend?' weekend-label':''}">${dateLabel}</span>
              </div>
            </td>
            <td><span class="ml-logged">${day.logged>0?fmtHM(day.logged):'—'}</span></td>
            <td><span class="ml-billable">${day.billable>0?fmtHM(day.billable):'—'}</span></td>
            <td><span class="ml-variance" style="color:${varZero?'var(--text-muted)':varPos?'var(--blue)':'var(--high)'}">${fmtVariance(day.variance)}</span></td>
          </tr>
          ${isActive?`
          ${day.entries.length>0?day.entries.map(log=>{
            const task=getTasks().find(t=>t.id===log.taskId);
            const lu=allUsers.find(u=>u.id===log.userId);
            const logVar=(log.billableH||0)-log.hours;
            return`<tr class="ml-entry-row${day.isWeekend?' ml-weekend':''}" data-log-uid="${esc(log.userId||'')}" data-viewer-uid="${esc(uid||'all')}">
              <td>
                ${lu?`<span style="font-weight:600;color:${lu.color}">${esc(lu.name)}</span><span style="color:var(--text-muted)"> — </span>`:''}
                ${task?esc(task.title):'Unknown task'}
                ${log.notes?`<div style="color:var(--text-muted);font-size:11px;margin-top:2px;line-height:1.4;white-space:pre-wrap">${esc(log.notes)}</div>`:''}
              </td>
              <td style="white-space:nowrap"><span class="ts-hours" style="font-size:12px">${fmtHM(log.hours)}</span></td>
              <td style="white-space:nowrap"><span class="ts-hours" style="font-size:12px;color:var(--low)">${log.billableH?fmtHM(log.billableH):'—'}</span></td>

          }).join(''):
          `<tr class="ml-entry-row${day.isWeekend?' ml-weekend':''}">
            <td colspan="4" style="font-style:italic;color:var(--text-muted)">No time logged this day</td>
          </tr>`}`:''}`;
        }).join('')}
      </tbody>
    </table>

    <!-- Totals footer -->
    <div class="ml-totals">
      <div class="ml-total-item">
        <div class="ml-total-val" style="color:var(--blue)">${fmtHM(totalLogged)||'0:00'}</div>
        <div class="ml-total-lbl">Total Logged Hours</div>
      </div>
      <div class="ml-total-item">
        <div class="ml-total-val" style="color:var(--low)">${fmtHM(totalBillable)||'0:00'}</div>

      <div class="ml-total-item">
        <div class="ml-total-val" style="color:${totalVariance>=0?'var(--blue)':'var(--high)'}">${fmtVariance(totalVariance)}</div>
        <div class="ml-total-lbl">Total Variance</div>
      </div>
    </div>
  </div>`;
}

function dpInit(id,val){
  const d=val?new Date(val+'T00:00:00'):new Date(TODAY);
  _dp[id]={y:d.getFullYear(),m:d.getMonth(),sel:val||null};
  dpRender(id);
}

function dpToggle(id){
  const popup=document.getElementById('dpp-'+id);
  const trigger=document.getElementById('dpt-'+id);
  const isOpen=popup.classList.contains('open');
  // close all
  document.querySelectorAll('.dp-popup.open').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.dp-trigger.open').forEach(t=>t.classList.remove('open'));
  if(!isOpen){
    dpRender(id);
    // position using fixed coords so it escapes any overflow:hidden parent
    const r=trigger.getBoundingClientRect();
    const popH=312; // approx calendar height
    const spaceBelow=window.innerHeight-r.bottom-8;
    popup.style.left=r.left+'px';
    popup.style.width=Math.max(r.width,272)+'px';
    if(spaceBelow<popH&&r.top>popH){
      // flip above
      popup.style.top='';
      popup.style.bottom=(window.innerHeight-r.top+6)+'px';
    } else {
      popup.style.bottom='';
      popup.style.top=(r.bottom+6)+'px';
    }
    popup.classList.add('open');
    trigger.classList.add('open');
  }
}

function dpNav(id,dir){
  const s=_dp[id];if(!s)return;
  s.m+=dir;
  if(s.m>11){s.m=0;s.y++;}
  if(s.m<0){s.m=11;s.y--;}
  dpRender(id);
}

function dpSelect(id,dateStr){
  const s=_dp[id];if(!s)return;
  s.sel=dateStr;
  document.getElementById(id).value=dateStr;
  const lbl=document.getElementById('dpl-'+id);
  lbl.textContent=dpFmt(dateStr);
  lbl.classList.remove('ph');
  // update clear button
  const trigger=document.getElementById('dpt-'+id);
  let clr=trigger.querySelector('.dp-trigger-clr');
  if(!clr){
    clr=document.createElement('button');
    clr.className='dp-trigger-clr';
    clr.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    clr.setAttribute('onclick',`dpClear(event,'${id}')`);
    trigger.appendChild(clr);
  }
  document.getElementById('dpp-'+id).classList.remove('open');
  trigger.classList.remove('open');
  dpRender(id);
}

function dpToday(id){
  const todayStr=TODAY.toISOString().split('T')[0];
  const d=new Date(TODAY);
  if(_dp[id]){_dp[id].y=d.getFullYear();_dp[id].m=d.getMonth();}
  dpSelect(id,todayStr);
}

function dpClear(e,id){
  if(e)e.stopPropagation();
  const s=_dp[id];if(s)s.sel=null;
  document.getElementById(id).value='';
  const lbl=document.getElementById('dpl-'+id);
  lbl.textContent='Select a date';lbl.classList.add('ph');
  const trigger=document.getElementById('dpt-'+id);
  const clr=trigger.querySelector('.dp-trigger-clr');
  if(clr)clr.remove();
  document.getElementById('dpp-'+id).classList.remove('open');
  trigger.classList.remove('open');
  dpRender(id);
}

function dpRender(id){
  const s=_dp[id];if(!s)return;
  const myEl=document.getElementById('dpmy-'+id);
  const grid=document.getElementById('dpg-'+id);
  if(!myEl||!grid)return;
  myEl.textContent=DP_MONTHS[s.m]+' '+s.y;
  const firstDay=new Date(s.y,s.m,1).getDay();
  const daysInMonth=new Date(s.y,s.m+1,0).getDate();
  const todayStr=TODAY.toISOString().split('T')[0];
  let html='';
  for(let i=0;i<firstDay;i++)html+='<div class="dp-cell dp-empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${s.y}-${String(s.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const isSel=ds===s.sel;
    const isPast=ds<todayStr;
    html+=`<div class="dp-cell${isToday?' dp-today':''}${isSel?' dp-selected':''}${isPast&&!isSel?' dp-past':''}" onclick="dpSelect('${id}','${ds}')">${d}</div>`;
  }
  grid.innerHTML=html;
}

function dpFmt(ds){
  if(!ds)return'Select a date';
  const[y,m,d]=ds.split('-');
  return`${DP_MONTHS_S[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

function updateSidebarClock(){
  const t=document.getElementById('sb-clock-time');
  const d=document.getElementById('sb-clock-date');
  if(!t||!d)return;
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  t.textContent=`${hh}:${mm}`;
  d.textContent=now.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function startSidebarClock(){
  updateSidebarClock();
  if(window._sbClockInt)clearInterval(window._sbClockInt);
  window._sbClockInt=setInterval(updateSidebarClock,1000);
}

// Realtime subscriptions for chat messages, tasks, and notifications
function setupRealtimeSubscriptions(){
  // Subscribe to new chat messages across all channels
  sb.channel('chat-global').on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_messages'},payload=>{
    const msg=snakeToCamel(payload.new);
    if(msg.userId===S.user.id)return;// Already added locally
    const jbId=msg.channel||payload.new.channel;
    if(!_memChatMsgs[jbId])_memChatMsgs[jbId]=[];
    const mapped={id:msg.id,userId:msg.userId,text:msg.text,files:msg.files||[],ts:msg.createdAt};
    // Avoid duplicates
    if(!_memChatMsgs[jbId].find(m=>m.id===mapped.id)){
      _memChatMsgs[jbId].push(mapped);
      // If viewing this chat, re-render
      if(S.view==='teamchat'||(S.jbId===jbId&&S.jbTab==='chat')){renderMain();}
    }
  }).subscribe();

  // Subscribe to notifications targeted at the current user
  sb.channel('notifs-'+S.user.id).on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:'target_user_id=eq.'+S.user.id},payload=>{
    const n=payload.new;
    if(_seenNotifs.has(n.id))return;
    _seenNotifs.add(n.id);
    const body=(n.assigner_name||'Someone')+' assigned you a task'+(n.jb_name?' on '+n.jb_name:'');
    // In-app toast
    try{toast(body);}catch(e){}
    // Browser notification (if permission granted)
    if('Notification' in window&&Notification.permission==='granted'){
      try{new Notification(n.task_title||'New task',{body,icon:'/favicon.ico',tag:n.id});}catch(e){}
    }
    // Mark as read so we don't re-notify on next login
    sb.from('notifications').update({read:true}).eq('id',n.id).then(()=>{});
  }).subscribe();

  // Subscribe to task changes so new/updated assignments appear live
  sb.channel('tasks-global').on('postgres_changes',{event:'*',schema:'public',table:'tasks'},payload=>{
    const tasks=getTasks();
    if(payload.eventType==='INSERT'){
      const t=snakeToCamel(payload.new);
      if(!tasks.find(x=>x.id===t.id)){
        tasks.push(t);
        _memTasks=tasks;
        if(S.view==='tasks'||S.view==='mytasks'||S.view==='jobBag')renderMain();
        renderSidebar();
      }
    }else if(payload.eventType==='UPDATE'){
      const t=snakeToCamel(payload.new);
      const idx=tasks.findIndex(x=>x.id===t.id);
      if(idx!==-1){
        const prevAssignees=tasks[idx].assignees||[];
        const newAssignees=t.assignees||[];
        tasks[idx]=t;
        _memTasks=tasks;
        // If this user was just newly assigned, we'll also get a notifs INSERT — no extra toast here
        if(S.view==='tasks'||S.view==='mytasks'||S.view==='jobBag')renderMain();
        renderSidebar();
      }
    }else if(payload.eventType==='DELETE'){
      const removedId=payload.old&&payload.old.id;
      if(removedId){
        _memTasks=tasks.filter(x=>x.id!==removedId);
        if(S.view==='tasks'||S.view==='mytasks'||S.view==='jobBag')renderMain();
        renderSidebar();
      }
    }
  }).subscribe();
}
